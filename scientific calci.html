<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#1e1e1e;
        font-family:Arial;
    }
    .calculator{
        background:#2c2c2c;
        padding:20px;
        border-radius:10px;
        text-align:center;
    }
    #display{
        width:100%;
        height:50px;
        font-size:20px;
        margin-bottom:10px;
        text-align:right;
        padding:5px;
    }
    button{
        width:60px;
        height:50px;
        margin:5px;
        font-size:16px;
        cursor:pointer;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <br>
    <button onclick="calcFunc('sin')">sin</button>
    <button onclick="calcFunc('cos')">cos</button>
    <button onclick="calcFunc('tan')">tan</button>
    <button onclick="calcFunc('sqrt')">√</button>

    <br>
    <button onclick="calcFunc('log')">log</button>
    <button onclick="calcFunc('square')">x²</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>

    <br>
    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('/')">/</button>

    <br>
    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('*')">*</button>

    <br>
    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('-')">-</button>

    <br>
    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="append('+')">+</button>

    <br>
    <button onclick="clearDisplay()">C</button>
</div>

<script>
let display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

// Safe evaluation
function evaluateExpression(expr){
    try{
        return Function("return " + expr)();
    }catch{
        return null;
    }
}

function calculate(){
    let result = evaluateExpression(display.value);
    display.value = (result !== null) ? result : "Error";
}

// Convert degree → radians
function toRadians(deg){
    return deg * (Math.PI / 180);
}

function calcFunc(func){
    let value = evaluateExpression(display.value);

    if(value === null){
        display.value = "Error";
        return;
    }

    switch(func){
        case 'sin':
            display.value = Math.sin(toRadians(value));
            break;
        case 'cos':
            display.value = Math.cos(toRadians(value));
            break;
        case 'tan':
            display.value = Math.tan(toRadians(value));
            break;
        case 'sqrt':
            display.value = Math.sqrt(value);
            break;
        case 'log':
            display.value = Math.log10(value);
            break;
        case 'square':
            display.value = Math.pow(value, 2);
            break;
    }
}
</script>

</body>
</html>
